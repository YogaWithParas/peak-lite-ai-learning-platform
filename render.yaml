services:
  - name: peak-lite-backend
    type: web
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    # Overrides the Dockerfile's default CMD (which runs Django's dev server,
    # fine for local Docker Compose) with a real production server for the
    # public deployment: migrate, then gunicorn bound to Render's assigned $PORT.
    dockerCommand: sh -c "python manage.py migrate && gunicorn peak_lite.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Matches any *.onrender.com subdomain, so this doesn't need updating
      # once Render assigns the final service URL.
      - key: ALLOWED_HOSTS
        value: .onrender.com
      # UPDATE THIS after your Vercel frontend URL is known -- see backend README.
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: LOGIN_THROTTLE_RATE
        value: 5/min
      - key: MATCH_THROTTLE_RATE
        value: 20/min
      - key: DB_NAME
        fromDatabase:
          name: peak-lite-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: peak-lite-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: peak-lite-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: peak-lite-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: peak-lite-db
          property: port

databases:
  - name: peak-lite-db
    plan: free
